services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://0.0.0.0:8000/get_info"]
      interval: 30s
      timeout: 60s
      retries: 3
      start_period: 30s

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy